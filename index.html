<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Parcelas</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Cálculo de Parcelas</h1>
    <form id="parcelasForm">
        <label for="valorTotal">Valor total da compra:</label>
        <input type="number" id="valorTotal" name="valorTotal" required>

        <label for="numParcelas">Número de parcelas:</label>
        <input type="number" id="numParcelas" name="numParcelas" required>

        <label for="taxaJuros">Taxa de juros mensal (%):</label>
        <input type="number" id="taxaJuros" name="taxaJuros" required>

        <button type="submit">Calcular</button>
    </form>
    <p>Valor de cada parcela: <span id="valorParcela"></span></p>
    <p>Valor total a pagar: <span id="valorTotalPagar"></span></p>
</body>
</html>
